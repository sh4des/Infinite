<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>localbox — playing</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="player-body">
  <a class="back" href="/">← library</a>

  <div class="nowplaying">
    <div class="title" id="np-title">Loading…</div>
    <div class="artist" id="np-artist"></div>
    <div class="queueinfo" id="queueinfo"></div>
  </div>

  <div class="stage">
    <canvas id="viz" width="720" height="720"></canvas>
    <div id="tapstart" class="tapstart" hidden><span>▶ Tap to start</span></div>
  </div>

  <div id="status" class="status">Fetching analysis…</div>

  <div class="controls" id="controls" hidden>
    <button id="playpause" class="primary">⏸ Pause</button>
    <button id="next" class="secondary" hidden>Next ⏭</button>
    <label class="ctl">Jump chance
      <input id="jump" type="range" min="0" max="100" value="18" />
      <span id="jumpval">18%</span>
    </label>
    <label class="ctl">Volume
      <input id="vol" type="range" min="0" max="100" value="85" />
    </label>
    <span class="stats" id="stats"></span>
  </div>

  <script src="/static/infinite.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const $ = (s) => document.querySelector(s);
    const statusEl = $("#status");
    const canvas = $("#viz");
    const g = canvas.getContext("2d");

    // Shared AudioContext for the whole session (needed for gapless shuffle).
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    InfiniteJukebox._ctx = audioCtx;

    let jukebox = null;
    let beats = [];
    let points = [];
    let curBeat = 0;
    let jumpFlash = null;
    let volume = 0.85;

    // ---- queue (shuffle) --------------------------------------------------
    let queue = [];   // [{id,title,artist}]
    let qpos = 0;
    const shuffleScope = params.get("shuffle");   // folder | all | stars | null

    async function buildQueue() {
      if (shuffleScope) {
        const url = "/api/shuffle?scope=" + encodeURIComponent(shuffleScope) +
          (params.get("path") ? "&path=" + encodeURIComponent(params.get("path")) : "");
        const res = await fetch(url);
        if (!res.ok) { statusEl.textContent = "Shuffle failed: " + (await res.text()); return false; }
        const data = await res.json();
        queue = data.tracks || [];
        if (!queue.length) {
          statusEl.textContent = shuffleScope === "stars"
            ? "No 5-star tracks found in your tags."
            : "No tracks found for that shuffle.";
          return false;
        }
        $("#next").hidden = false;
      } else if (params.get("id")) {
        queue = [{ id: params.get("id"), title: params.get("title") || "", artist: params.get("artist") || "" }];
      }
      qpos = 0;
      return queue.length > 0;
    }

    function updateQueueInfo() {
      const qi = $("#queueinfo");
      if (shuffleScope) {
        const label = { folder: "this folder", all: "everywhere", stars: "5-star" }[shuffleScope] || shuffleScope;
        qi.textContent = `🔀 shuffle · ${label} · ${qpos + 1} of ${queue.length}`;
      } else qi.textContent = "";
    }

    // ---- visualiser -------------------------------------------------------
    function layout() {
      const n = beats.length;
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const R = Math.min(cx, cy) - 40;
      points = beats.map((b, i) => {
        const a = (i / n) * Math.PI * 2 - Math.PI / 2;
        return { x: cx + Math.cos(a) * R, y: cy + Math.sin(a) * R };
      });
    }

    function draw() {
      g.clearRect(0, 0, canvas.width, canvas.height);
      if (points.length) {
        for (let i = 0; i < beats.length; i++) {
          const edges = beats[i].edges || [];
          for (const e of edges) {
            const p1 = points[i], p2 = points[e.to];
            const active = i === curBeat;
            g.strokeStyle = active ? "rgba(120,220,255,0.55)" : "rgba(120,160,200,0.05)";
            g.lineWidth = active ? 1.5 : 1;
            g.beginPath();
            g.moveTo(p1.x, p1.y);
            const mx = (p1.x + p2.x) / 2 + (canvas.width / 2 - (p1.x + p2.x) / 2) * 0.6;
            const my = (p1.y + p2.y) / 2 + (canvas.height / 2 - (p1.y + p2.y) / 2) * 0.6;
            g.quadraticCurveTo(mx, my, p2.x, p2.y);
            g.stroke();
          }
        }
        for (let i = 0; i < points.length; i++) {
          const p = points[i], isCur = i === curBeat;
          g.beginPath();
          g.arc(p.x, p.y, isCur ? 7 : 2.5, 0, Math.PI * 2);
          g.fillStyle = isCur ? "#7fdcff" : (beats[i].edges && beats[i].edges.length ? "#5b7a99" : "#33465a");
          g.fill();
        }
        if (jumpFlash && performance.now() - jumpFlash.t < 400) {
          const p1 = points[jumpFlash.from], p2 = points[jumpFlash.to];
          g.strokeStyle = "rgba(255,180,90,0.9)";
          g.lineWidth = 2.5;
          g.beginPath();
          g.moveTo(p1.x, p1.y);
          g.lineTo(p2.x, p2.y);
          g.stroke();
        }
      }
      requestAnimationFrame(draw);
    }

    // ---- load a track and start playing -----------------------------------
    async function loadAndPlay(track) {
      if (jukebox) { jukebox.destroy(); jukebox = null; }
      curBeat = 0; jumpFlash = null; points = [];
      $("#np-title").textContent = track.title || "Track";
      $("#np-artist").textContent = track.artist || "";
      updateQueueInfo();

      statusEl.textContent = "Analysing (first play only)…";
      let res = await fetch("/api/analyse/" + encodeURIComponent(track.id));
      if (!res.ok) { statusEl.textContent = "Analysis failed: " + (await res.text()); return; }
      const data = await res.json();
      $("#np-title").textContent = data.info.title || track.title || "Track";
      $("#np-artist").textContent = data.info.artist || track.artist || "";

      statusEl.textContent = "Loading audio…";
      const audioRes = await fetch("/api/audio/" + encodeURIComponent(track.id));
      const arr = await audioRes.arrayBuffer();
      const buffer = await audioCtx.decodeAudioData(arr);

      jukebox = new InfiniteJukebox(data, buffer, {
        onBeat: (i, stats) => {
          curBeat = i;
          $("#stats").textContent = `${stats.beatsPlayed} beats · ${stats.jumps} jumps`;
        },
        onJump: (from, to) => { jumpFlash = { from, to, t: performance.now() }; },
      });
      jukebox.setVolume(volume);
      jukebox.setJumpProbability(($("#jump").value) / 100);
      beats = jukebox.beats;
      layout();

      statusEl.textContent = `∞ ${beats.length} beats · ${jukebox.edgeCount} natural jump paths`;
      $("#controls").hidden = false;
      $("#playpause").textContent = "⏸ Pause";
      startPlayback();
    }

    // Autoplay, working around browser gesture policies.
    function startPlayback() {
      const go = () => { if (jukebox) jukebox.play(); };
      go();
      if (audioCtx.state === "suspended") {
        // needs a user gesture: show a tap overlay and resume on first interaction
        const tap = $("#tapstart");
        tap.hidden = false;
        const resume = () => {
          audioCtx.resume().then(() => {
            tap.hidden = true;
            go();
          });
          window.removeEventListener("pointerdown", resume);
          window.removeEventListener("keydown", resume);
        };
        window.addEventListener("pointerdown", resume, { once: true });
        window.addEventListener("keydown", resume, { once: true });
      }
    }

    function playNext() {
      if (!queue.length) return;
      qpos = (qpos + 1) % queue.length;
      loadAndPlay(queue[qpos]);
    }

    // ---- controls ---------------------------------------------------------
    $("#playpause").onclick = function () {
      if (!jukebox) return;
      if (jukebox.playing) { jukebox.pause(); this.textContent = "▶ Play"; }
      else { jukebox.resume(); this.textContent = "⏸ Pause"; }
    };
    $("#next").onclick = playNext;
    $("#jump").oninput = function () {
      $("#jumpval").textContent = this.value + "%";
      if (jukebox) jukebox.setJumpProbability(this.value / 100);
    };
    $("#vol").oninput = function () { volume = this.value / 100; if (jukebox) jukebox.setVolume(volume); };
    $("#tapstart").onclick = function () { audioCtx.resume(); this.hidden = true; if (jukebox) jukebox.play(); };

    // ---- boot -------------------------------------------------------------
    (async function boot() {
      draw();
      const ok = await buildQueue();
      if (!ok) { if (!statusEl.textContent) statusEl.textContent = "Nothing to play."; return; }
      loadAndPlay(queue[qpos]);
    })();
  </script>
</body>
</html>
