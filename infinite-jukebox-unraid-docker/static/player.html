<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>infinite-jukebox — playing</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="player-body">
  <div class="topbar">
    <a class="back" id="album-link" href="/">‹ back to album</a>
    <a class="back" href="/">library</a>
    <a class="back stats-link" href="/stats">📊 stats</a>
  </div>

  <div class="nowplaying">
    <div class="title" id="np-title">Loading…</div>
    <div class="artist" id="np-artist"></div>
    <div class="queueinfo" id="queueinfo"></div>
    <div class="playtime" id="playtime"></div>
  </div>

  <div class="stage">
    <canvas id="viz" width="720" height="720"></canvas>
    <div id="tapstart" class="tapstart" hidden><span>▶ Tap to start</span></div>
  </div>

  <div id="status" class="status">Fetching analysis…</div>

  <div class="controls" id="controls" hidden>
    <button id="playpause" class="primary">⏸ Pause</button>
    <button id="next" class="secondary" hidden>Next ⏭</button>
    <label class="ctl">Auto-advance
      <select id="autoadv">
        <option value="0">Off</option>
        <option value="60">1 min</option>
        <option value="180">3 min</option>
        <option value="300">5 min</option>
        <option value="600">10 min</option>
        <option value="1800">30 min</option>
      </select>
    </label>
    <label class="ctl">Jump chance
      <input id="jump" type="range" min="0" max="100" value="18" />
      <span id="jumpval">18%</span>
    </label>
    <label class="ctl">Volume
      <input id="vol" type="range" min="0" max="100" value="85" />
    </label>
    <span class="stats" id="stats"></span>
  </div>

  <script src="/static/errors.js"></script>
  <script src="/static/infinite.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const $ = (s) => document.querySelector(s);
    const statusEl = $("#status");
    const canvas = $("#viz");
    const g = canvas.getContext("2d");

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    InfiniteJukebox._ctx = audioCtx;

    let jukebox = null, beats = [], points = [], curBeat = 0, jumpFlash = null;
    let volume = 0.85;
    let currentId = null, currentDuration = 0;

    // ---- queue (shuffle) --------------------------------------------------
    let queue = [], qpos = 0;
    const shuffleScope = params.get("shuffle");

    async function buildQueue() {
      if (shuffleScope) {
        const url = "/api/shuffle?scope=" + encodeURIComponent(shuffleScope) +
          (params.get("path") ? "&path=" + encodeURIComponent(params.get("path")) : "");
        const res = await fetch(url);
        if (!res.ok) {
          const t = await res.text();
          statusEl.textContent = "Shuffle failed: " + t;
          ijError("Shuffle failed: " + t, { critical: true });
          return false;
        }
        queue = (await res.json()).tracks || [];
        if (!queue.length) {
          statusEl.textContent = shuffleScope === "stars"
            ? "No 5-star tracks found in your tags." : "No tracks found for that shuffle.";
          return false;
        }
        $("#next").hidden = false;
      } else if (params.get("id")) {
        queue = [{ id: params.get("id"), title: params.get("title") || "",
                   artist: params.get("artist") || "", path: params.get("path") || "" }];
      }
      qpos = 0;
      return queue.length > 0;
    }

    function updateQueueInfo() {
      const qi = $("#queueinfo");
      if (shuffleScope) {
        const label = { folder: "this folder", all: "everywhere", stars: "5-star" }[shuffleScope] || shuffleScope;
        qi.textContent = `🔀 shuffle · ${label} · ${qpos + 1} of ${queue.length}`;
      } else qi.textContent = "";
    }

    // ---- stats ------------------------------------------------------------
    let lastTick = Date.now();
    function flushTime() {
      const now = Date.now();
      const delta = (now - lastTick) / 1000;
      lastTick = now;
      if (currentId && jukebox && jukebox.playing && delta > 0 && delta < 3600) {
        const body = JSON.stringify({ id: currentId, seconds: delta, duration: currentDuration });
        if (navigator.sendBeacon) {
          navigator.sendBeacon("/api/stats/time", new Blob([body], { type: "application/json" }));
        } else {
          fetch("/api/stats/time", { method: "POST", headers: { "Content-Type": "application/json" }, body, keepalive: true });
        }
      }
    }
    setInterval(flushTime, 15000);
    document.addEventListener("visibilitychange", () => { if (document.hidden) flushTime(); });
    window.addEventListener("pagehide", flushTime);

    // ---- live playtime for the current track ------------------------------
    function fmtTime(sec) {
      sec = Math.floor(sec);
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      const pad = (x) => String(x).padStart(2, "0");
      return h ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
    }
    let trackPlayMs = 0, lastPlayTs = Date.now();
    setInterval(() => {
      const now = Date.now();
      if (jukebox && jukebox.playing) trackPlayMs += now - lastPlayTs;
      lastPlayTs = now;
      $("#playtime").textContent = jukebox ? "▶ playing " + fmtTime(trackPlayMs / 1000) : "";
    }, 1000);

    function dirname(p) {
      if (!p) return "";
      const i = p.lastIndexOf("/");
      return i > 0 ? p.slice(0, i) : "";
    }

    // ---- visualiser -------------------------------------------------------
    function layout() {
      const n = beats.length, cx = canvas.width / 2, cy = canvas.height / 2;
      const R = Math.min(cx, cy) - 40;
      points = beats.map((b, i) => {
        const a = (i / n) * Math.PI * 2 - Math.PI / 2;
        return { x: cx + Math.cos(a) * R, y: cy + Math.sin(a) * R };
      });
    }
    function draw() {
      g.clearRect(0, 0, canvas.width, canvas.height);
      if (points.length) {
        for (let i = 0; i < beats.length; i++) {
          for (const e of (beats[i].edges || [])) {
            const p1 = points[i], p2 = points[e.to], active = i === curBeat;
            g.strokeStyle = active ? "rgba(120,220,255,0.55)" : "rgba(120,160,200,0.05)";
            g.lineWidth = active ? 1.5 : 1;
            g.beginPath(); g.moveTo(p1.x, p1.y);
            const mx = (p1.x + p2.x) / 2 + (canvas.width / 2 - (p1.x + p2.x) / 2) * 0.6;
            const my = (p1.y + p2.y) / 2 + (canvas.height / 2 - (p1.y + p2.y) / 2) * 0.6;
            g.quadraticCurveTo(mx, my, p2.x, p2.y); g.stroke();
          }
        }
        for (let i = 0; i < points.length; i++) {
          const p = points[i], isCur = i === curBeat;
          g.beginPath(); g.arc(p.x, p.y, isCur ? 7 : 2.5, 0, Math.PI * 2);
          g.fillStyle = isCur ? "#7fdcff" : (beats[i].edges && beats[i].edges.length ? "#5b7a99" : "#33465a");
          g.fill();
        }
        if (jumpFlash && performance.now() - jumpFlash.t < 400) {
          const p1 = points[jumpFlash.from], p2 = points[jumpFlash.to];
          g.strokeStyle = "rgba(255,180,90,0.9)"; g.lineWidth = 2.5;
          g.beginPath(); g.moveTo(p1.x, p1.y); g.lineTo(p2.x, p2.y); g.stroke();
        }
      }
      requestAnimationFrame(draw);
    }

    // ---- audio decode with Safari/iOS transcode fallback ------------------
    function decode(arr) {
      return new Promise((resolve, reject) => {
        const p = audioCtx.decodeAudioData(arr, resolve, reject);
        if (p && p.then) p.then(resolve, reject);
      });
    }
    async function loadBuffer(id) {
      const arr = await (await fetch("/api/audio/" + encodeURIComponent(id))).arrayBuffer();
      try {
        return await decode(arr);
      } catch (e) {
        // iOS/Safari Web Audio can't decode ogg/opus/flac — force an mp3 transcode
        ijWarn("native decode failed, retrying with mp3 transcode", id, e && e.message);
        const arr2 = await (await fetch("/api/audio/" + encodeURIComponent(id) + "?transcode=1")).arrayBuffer();
        return await decode(arr2);
      }
    }

    // ---- load a track -----------------------------------------------------
    async function loadAndPlay(track) {
      flushTime();
      if (jukebox) { jukebox.destroy(); jukebox = null; }
      // hide controls until this track is fully ready (analysed + decoded)
      $("#controls").hidden = true;
      $("#tapstart").hidden = true;
      curBeat = 0; jumpFlash = null; points = []; currentId = track.id;
      trackPlayMs = 0; lastPlayTs = Date.now();
      // point "back to album" at this track's folder (if we know its path)
      const album = dirname(track.path || "");
      const albumLink = $("#album-link");
      if (album) { albumLink.href = "/#" + encodeURIComponent(album); albumLink.hidden = false; }
      else { albumLink.hidden = true; }
      $("#np-title").textContent = track.title || "Track";
      $("#np-artist").textContent = track.artist || "";
      updateQueueInfo();

      statusEl.textContent = "Analysing (first play only)…";
      ijInfo("loading track", track.id, track.title || "");
      let res = await fetch("/api/analyse/" + encodeURIComponent(track.id));
      if (!res.ok) {
        const t = await res.text();
        statusEl.textContent = "Analysis failed: " + t;
        ijError("Analysis failed for '" + (track.title || track.id) + "': " + t, { critical: true });
        return;
      }
      const data = await res.json();
      currentDuration = data.audio_summary.duration || 0;
      $("#np-title").textContent = data.info.title || track.title || "Track";
      $("#np-artist").textContent = data.info.artist || track.artist || "";

      // record the selection
      fetch("/api/stats/play", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: track.id, title: data.info.title, artist: data.info.artist, duration: currentDuration }),
      }).catch(() => {});

      statusEl.textContent = "Loading audio…";
      let buffer;
      try { buffer = await loadBuffer(track.id); }
      catch (e) {
        statusEl.textContent = "Could not decode audio for this track.";
        ijError("Audio decode failed for '" + (data.info.title || track.id) + "'", { critical: true, detail: e });
        return;
      }

      jukebox = new InfiniteJukebox(data, buffer, {
        onBeat: (i, s) => { curBeat = i; $("#stats").textContent = `${s.beatsPlayed} beats · ${s.jumps} jumps`; },
        onJump: (from, to) => { jumpFlash = { from, to, t: performance.now() }; },
      });
      jukebox.setVolume(volume);
      jukebox.setJumpProbability(($("#jump").value) / 100);
      beats = jukebox.beats;
      layout();
      statusEl.textContent = `∞ ${beats.length} beats · ${jukebox.edgeCount} natural jump paths`;
      $("#controls").hidden = false;
      $("#playpause").textContent = "⏸ Pause";
      lastTick = Date.now();
      startPlayback();
    }

    function startPlayback() {
      // If the context is already running (desktop, or after a prior gesture),
      // just play. Otherwise DON'T start the engine yet — starting it while the
      // context is suspended freezes the clock and makes the tap a no-op. Show
      // the overlay and only begin playback once a real gesture resumes audio.
      if (audioCtx.state === "running") {
        jukebox.play(); lastTick = Date.now();
        return;
      }
      const tap = $("#tapstart");
      tap.hidden = false;
      let started = false;
      const kick = (e) => {
        if (e && e.cancelable) e.preventDefault();
        window.removeEventListener("pointerdown", kick);
        window.removeEventListener("keydown", kick);
        audioCtx.resume().then(() => {
          if (started) return;
          started = true;
          tap.hidden = true;
          if (jukebox) { jukebox.play(); lastTick = Date.now(); }
          ijInfo("playback started after gesture");
        }).catch((err) => ijError("could not start audio", { critical: true, detail: err }));
      };
      tap.addEventListener("click", kick);
      tap.addEventListener("touchend", kick);
      window.addEventListener("pointerdown", kick);
      window.addEventListener("keydown", kick);
    }

    function playNext() {
      if (!queue.length) return;
      qpos = (qpos + 1) % queue.length;
      loadAndPlay(queue[qpos]);
    }

    // ---- auto-advance timer ----------------------------------------------
    let advTimer = null;
    function setAutoAdvance(sec) {
      if (advTimer) { clearInterval(advTimer); advTimer = null; }
      if (sec > 0) advTimer = setInterval(playNext, sec * 1000);
    }

    // ---- controls ---------------------------------------------------------
    $("#playpause").onclick = function () {
      if (!jukebox) return;
      if (jukebox.playing) { jukebox.pause(); flushTime(); this.textContent = "▶ Play"; }
      else { jukebox.resume(); lastTick = Date.now(); this.textContent = "⏸ Pause"; }
    };
    $("#next").onclick = playNext;
    $("#autoadv").onchange = function () { setAutoAdvance(parseInt(this.value, 10)); };
    $("#jump").oninput = function () { $("#jumpval").textContent = this.value + "%"; if (jukebox) jukebox.setJumpProbability(this.value / 100); };
    $("#vol").oninput = function () { volume = this.value / 100; if (jukebox) jukebox.setVolume(volume); };
    $("#tapstart").onclick = function () { audioCtx.resume(); this.hidden = true; if (jukebox) jukebox.play(); lastTick = Date.now(); };

    // ---- boot -------------------------------------------------------------
    (async function boot() {
      draw();
      const ok = await buildQueue();
      if (!ok) { if (!statusEl.textContent) statusEl.textContent = "Nothing to play."; return; }
      loadAndPlay(queue[qpos]);
    })();
  </script>
</body>
</html>
